<script>
        // Formatted direct export link to bypass security filters completely
        const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/1vTbOdzQtmthcOZukqGIjJtz25LKwLURVkzhhnDMUKdK8t2WrVQRuVz_VFva7KkN9CECEONxCDkbwfBO/export?format=csv&gid=1931844735";

        // Curated scouting backgrounds
        const scoutImages = [
            "https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=500&q=80",
            "https://images.unsplash.com/photo-1470246973918-29a93221c455?auto=format&fit=crop&w=500&q=80",
            "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=500&q=80",
            "https://images.unsplash.com/photo-1501555088652-021faa106b9b?auto=format&fit=crop&w=500&q=80",
            "https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=500&q=80",
            "https://images.unsplash.com/photo-1533240332313-0db49b459ad6?auto=format&fit=crop&w=500&q=80"
        ];

        function loadSpotlights() {
            // Appends the live timestamp directly onto the clean export URL
            const finalFetchUrl = GOOGLE_SHEET_URL + "&t=" + new Date().getTime();
            const grid = document.getElementById('spotlight-grid');

            Papa.parse(finalFetchUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    const data = results.data;
                    grid.innerHTML = ''; 

                    const scouts = [];
                    const leaders = [];
                    const alumni = [];

                    data.forEach(person => {
                        if (!person["Full Name"] || person["Full Name"].trim() === "") return;

                        const categoryStr = (person["Category"] || person["Category "] || "").toLowerCase().trim();

                        if (categoryStr === "scout") {
                            scouts.push(person);
                        } else if (categoryStr === "adult leader" || categoryStr === "leader") {
                            leaders.push(person);
                        } else if (categoryStr === "alumni" || categoryStr === "alumnus") {
                            alumni.push(person);
                        }
                    });

                    function getRandomPerson(array) {
                        if (array.length === 0) return null;
                        const randomIndex = Math.floor(Math.random() * array.length);
                        return array[randomIndex];
                    }

                    const chosenThree = [
                        getRandomPerson(scouts),
                        getRandomPerson(leaders),
                        getRandomPerson(alumni)
                    ].filter(p => p !== null);

                    if (chosenThree.length === 0) {
                        grid.innerHTML = `<p class="text-center text-gray-500 col-span-full">No active spotlights found in the database yet.</p>`;
                        return;
                    }

                    const shuffledImages = [...scoutImages].sort(() => 0.5 - Math.random());

                    chosenThree.forEach((person, index) => {
                        const category = person["Category"] || person["Category "] || "Scout";
                        const rank = person["Scout Rank"] || person["Scout Rank "] || "N/A";
                        const role = person["Role in Troop"] || person["Role in Troop "] || "Member";
                        const hobbies = person["Hobbies and Interests"] || person["Hobbies and Interests "] || "None specified";
                        const photo = shuffledImages[index % shuffledImages.length];

                        const card = document.createElement('div');
                        card.className = "bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 flex flex-col transform transition-all duration-300 ease-in-out hover:-translate-y-2 hover:shadow-xl opacity-0 card-animate";
                        card.style.animationDelay = (index * 150) + "ms";

                        card.innerHTML = `
                            <div class="overflow-hidden h-56 w-full relative">
                                <img class="h-full w-full object-cover transform hover:scale-110 transition-transform duration-500 ease-in-out" src="${photo}" alt="Scouting Adventure Image">
                            </div>
                            <div class="p-6 flex-1 flex flex-col justify-between">
                                <div>
                                    <span class="inline-block px-3 py-1 text-xs font-semibold uppercase tracking-wider bg-blue-100 text-blue-800 rounded-full mb-2">
                                        ${category}
                                    </span>
                                    <h2 class="text-2xl font-bold text-gray-800">${person["Full Name"]}</h2>
                                    <p class="text-sm font-medium text-gray-500 mt-1">${role} • <span class="italic">${rank}</span></p>
                                    
                                    <div class="mt-4 border-t border-gray-100 pt-4">
                                        <p class="text-sm text-gray-600"><strong>Hobbies & Interests:</strong> ${hobbies}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                },
                error: function(err) {
                    console.error("Error parsing sheet:", err);
                    document.getElementById('spotlight-grid').innerHTML = `<p class="text-red-500 col-span-full text-center">Failed to load troop profiles.</p>`;
                }
            });
        }

        window.onload = function() {
            loadSpotlights();
            setInterval(loadSpotlights, 5000);
        };
    </script>
</body>
</html>
