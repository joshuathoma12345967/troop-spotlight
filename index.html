<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troop Spotlight Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Smooth fade-in animation for when the page loads */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <header class="bg-blue-900 text-white py-12 text-center shadow-md transition-all duration-500 ease-in-out">
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight transform hover:scale-105 transition-transform duration-300 cursor-default">
            Troop Spotlight Hub
        </h1>
        <p class="mt-3 text-blue-200 text-lg opacity-90">Celebrating our Scouts, Leaders, and Alumni</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div id="spotlight-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-center text-gray-500 col-span-full animate-pulse text-lg">Loading spotlights...</p>
        </div>
    </main>

    <script>
        // Your published URL with a cache breaker
        const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbOdzQtmthcOZukqGIjJtz25LKwLURVkzhhnDMUKdK8t2WrVQRuVz_VFva7KkN9CECEONxCDkbwfBO/pub?gid=1931844735&single=true&output=csv";
        const SHEET_CSV_URL = BASE_URL + "&t=" + new Date().getTime();

        function loadSpotlights() {
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    const data = results.data;
                    const grid = document.getElementById('spotlight-grid');
                    grid.innerHTML = ''; // Clear loading text

                    data.forEach((person, index) => {
                        // Skip empty rows or rows missing a name
                        if (!person["Full Name"]) return; 

                        // Smart fallback mapping for column keys
                        const category = person["Category"] || person["Category "] || "Scout";
                        const rank = person["Scout Rank"] || person["Scout Rank "] || "N/A";
                        const role = person["Role in Troop"] || person["Role in Troop "] || "Member";
                        const hobbies = person["Hobbies and Interests"] || person["Hobbies and Interests "] || "None specified";
                        const photoUrl = person["Photo of yourself (Put URL)"] || person["Photo of yourself (Put URL) "] || "";
                        
                        // Default image placeholder
                        const photo = photoUrl || "https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=400&q=80";

                        // Create card element
                        const card = document.createElement('div');
                        
                        // Added classes: 
                        // - 'animate-fade-in-up' makes them slide up gracefully
                        // - 'hover:-translate-y-2 hover:shadow-xl' adds the lifting hover effect
                        // - 'transition-all duration-300' ensures everything animates smoothly
                        card.className = "bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 flex flex-col transform transition-all duration-300 ease-in-out hover:-translate-y-2 hover:shadow-xl opacity-0 animate-fade-in-up";
                        
                        // Stagger the animation slightly for each card so they ripple in row-by-row
                        card.style.animationDelay = `${index * 100}ms`;
                        
                        card.innerHTML = `
                            <div class="overflow-hidden h-56 w-full relative">
                                <img class="h-full w-full object-cover transform hover:scale-110 transition-transform duration-500 ease-in-out" src="${photo}" alt="${person["Full Name"]}">
                            </div>
                            <div class="p-6 flex-1 flex flex-col justify-between">
                                <div>
                                    <span class="inline-block px-3 py-1 text-xs font-semibold uppercase tracking-wider bg-blue-100 text-blue-800 rounded-full mb-2">
                                        ${category}
                                    </span>
                                    <h2 class="text-2xl font-bold text-gray-800">${person["Full Name"]}</h2>
                                    <p class="text-sm font-medium text-gray-500 mt-1">${role} • <span class="italic">${rank}</span></p>
                                    
                                    <div class="mt-4 border-t border-gray
